            "@type": "Answer",

          "@type": "Question",
          "name": "What four levers does EconLever model?",

            "@type": "Answer",
            "text": "Top marginal income tax rate, corporate tax rate, welfare spending as a share of GDP, and the federal funds rate."

          "@type": "Question",
          "name": "How are the coefficients calibrated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Lever coefficients are derived from peer-reviewed macroeconomic research and applied additively to a 2025 U.S. baseline. The full methodology and coefficient table are documented on the Methodology page."

        },

          "@type": "Question",
          "name": "Is EconLever free to use?",
